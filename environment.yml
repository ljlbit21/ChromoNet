name: chromonet
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.4.1
  - torchvision=0.19.1
  - torchaudio=2.4.1
  - pytorch-cuda=12.4  # 如果你有 GPU，保留这一行；无 GPU 可删除
  - numpy=1.26.4
  - pandas=2.2.2
  - scikit-learn=1.5.1
  - scipy=1.14.1
  - matplotlib=3.9.2
  - seaborn=0.13.2
  - scanpy=1.10.2
  - tqdm=4.66.5
  - openpyxl=3.1.5
  - pip
  - pip:
      - ipykernel   # 用于 Jupyter Notebook
      - jupyter
      - nbformat

# 可选：固定随机种子相关环境变量（推荐）
variables:
  PYTHONHASHSEED: 42
  OMP_NUM_THREADS: 1
